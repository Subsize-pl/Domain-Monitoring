<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Notification{% endblock %}</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #f6f7fb;
        font-family: Arial, sans-serif;
        color: #1f2937;
      }
      .wrapper {
        max-width: 640px;
        margin: 0 auto;
        padding: 32px 16px;
      }
      .card {
        background: #ffffff;
        border-radius: 16px;
        padding: 32px;
        border: 1px solid #e5e7eb;
      }
      .button {
        display: inline-block;
        background: #2563eb;
        color: #ffffff !important;
        text-decoration: none;
        padding: 12px 20px;
        border-radius: 10px;
        font-weight: 600;
      }
      .footer {
        margin-top: 24px;
        font-size: 12px;
        color: #6b7280;
      }
      .muted {
        color: #6b7280;
        font-size: 14px;
      }
      .break-word {
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="card">
        {% block content %}{% endblock %}
      </div>
      <div class="footer">
        <p>Best regards,<br />The Team</p>
      </div>
    </div>
  </body>
</html>
